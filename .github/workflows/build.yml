name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # necesario para crear releases en tags

jobs:
  # Compilación rápida en cada push/PR para detectar que rompe
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build src/EasyRest.Avalonia/EasyRest.Avalonia.csproj -c Release

  # Binarios autocontenidos por plataforma. Corre en tags v* o a mano (workflow_dispatch).
  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64,   name: windows-x64 }
          - { os: macos-latest,   rid: osx-arm64,  name: macos-arm64 }
          - { os: macos-13,       rid: osx-x64,    name: macos-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Windows: single-file autocontenido. macOS: carpeta (se arma un .app abajo).
      - name: Publish (${{ matrix.rid }})
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA="-p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true"
          fi
          dotnet publish src/EasyRest.Avalonia/EasyRest.Avalonia.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:DebugType=none -p:DebugSymbols=false $EXTRA \
            -o publish/${{ matrix.name }}

      - name: Empaquetar (Windows .exe)
        if: runner.os == 'Windows'
        shell: bash
        run: 7z a "EasyRest-${{ matrix.name }}.zip" "./publish/${{ matrix.name }}/EasyRest.exe"

      - name: Empaquetar (macOS .app)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"; [ "$VERSION" = "${GITHUB_REF_NAME}" ] && VERSION="0.0.0"
          APP="EasyRest.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R "publish/${{ matrix.name }}/." "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/EasyRest"
          sed "s/__VERSION__/${VERSION}/g" build/Info.plist > "$APP/Contents/Info.plist"
          # ditto preserva el bundle y los permisos (zip común los pierde)
          ditto -c -k --keepParent "$APP" "EasyRest-${{ matrix.name }}.zip"

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: EasyRest-${{ matrix.name }}
          path: EasyRest-${{ matrix.name }}.zip

      - name: Adjuntar al release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: EasyRest-${{ matrix.name }}.zip
